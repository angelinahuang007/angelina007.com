  #   container_name: angelina-umami
  #   restart: always
  #   environment:
  #     DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@postgres:5432/umami
  #     DATABASE_TYPE: postgresql
  #     HASH_SALT: ${UMAMI_HASH_SALT:-}
  #     TRACKER_SCRIPT_NAME: track
  #   depends_on:
  #     - postgres
  #   networks:
  #     - angelina-network
  #   logging:
  #     driver: "json-file"
